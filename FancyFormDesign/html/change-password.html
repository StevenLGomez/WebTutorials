
<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="css/reset.css" media="screen">
        <link rel="stylesheet" type="text/css" href="css/fancyforms.css" media="screen">
    </head>
    <body>

<!-- change-password.html excerpt from page 65 -->

    <h1>Change Password</h1>
    <form action="#" method="get">
    <fieldset>

        <!-- Current -->
        <div>
            <label for="current">Current password</label>
            <input type="password" name="current" value="" id="current"/>
        </div>

        <!-- New -->
        <div>
            <label for="new">New password</label>
            <input type="password" name="new" value="" id="new"/>
        </div>

        <!-- Confirm -->
        <div>
            <label for="confirm">Confirm password</label>
            <input type="password" name="confirm" value="" id="confirm"/>
        </div>

        <!-- Controls -->
        <div class="controls">
            <input id="submit" name="submit" type="submit" value="Change password"/>
        </div>

    </fieldset>
    </form>

    </body>
</html>
</!doctype>
