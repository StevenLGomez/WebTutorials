
<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="css/reset.css" media="screen">
        <link rel="stylesheet" type="text/css" href="css/fancyforms.css" media="screen">
    </head>
    <body>

<!-- edit-profile.html excerpt from page 66-68 -->

    <h1>Edit Profile</h1>
    <form action="#" method="post">
    <fieldset>

        <!-- photo -->
        <div>
            <label for="your_photo">Your profile photo</label>
            <input type="file" name="your_photo" value="" id="your_photo"/>
        </div>

        <!-- first name -->
        <div>
            <label for="firstname">First name</label>
            <input type="text" name="firstname" value="" id="firstname"/>
        </div>

        <!-- last name -->
        <div>
            <label for="lastname">Last name</label>
            <input type="text" name="lastname" value="" id="lastname"/>
        </div>

        <!-- gender -->
        <div>
            <fieldset id="gender" class="">
                <legend><span>Gender</span></legend>
                <label for="female">Female</label>
                <input type="radio" name="gender" value="female" id="female"/>
                <label for="male">Male</label>
                <input type="radio" name="gender" value="male" id="male"/>
            </fieldset>
        </div>

        <!-- DOB -->
        <fieldset id="section-dob" class="group">

            <legend><span>Birth date</span></legend>

            <!-- Month -->
            <div>
                <label for="dob_month">Month</label>
                <select name="dob_month" id="dob_month">
                <option value=""> - Month - </option>
                 ⋮ months
                </select>
            </div>

            <!-- Day -->
            <div>
                <label for="dob_day">Day</label>
                <select name="dob_day" id="dob_day">
                    <option value=""> - Day - </option>
                    <option value="1">1</option>
                     ⋮ days
                </select>
            </div>

            <!-- Year -->
            <div>
                <label for="dob_year">Year</label>
                <select name="dob_year" id="dob_year">
                    <option value=""> - Year - </option>
                    <option value="2004">2004</option>
                     ⋮ years
                </select>
            </div>

            <em class="note">This is hidden by default from your profile.</em>

        </fieldset>

        <!-- about you -->
        <div>
            <label for="about_you">About you</label>
            <textarea name="about_you" id="about_you" cols="30" rows="6"></textarea>
        </div>

        <!-- website url -->
        <div>
            <label for="website_url">Website URL</label>
            <input type="text" name="website_url" value="" id="website_url"/>
        </div>

        <!-- website name -->
        <div>
            <label for="website_name">Website name</label>
            <input type="text" name="website_url" value="" id="website_name"/>
        </div>

        <!-- Controls -->
        <div class="controls">
            <input id="submit" name="submit" type="submit" value="Create Profile"/>
        </div>

    </fieldset>

    </form>


    </body>
</html>
</!doctype>
